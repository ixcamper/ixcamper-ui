<div class="login-container">
  <h2>Login to ixcamper</h2>
  <form (ngSubmit)="onLogin()">
    <input [(ngModel)]="loginData.username" name="username" placeholder="Username" required />
    <input
      [(ngModel)]="loginData.password"
      name="password"
      type="password"
      placeholder="Password"
      required
    />
    <button type="submit">Login</button>
  </form>
</div>
